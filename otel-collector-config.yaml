receivers:

  otlp:

    protocols:

      grpc:
        endpoint: 0.0.0.0:4317


      http:
        endpoint: 0.0.0.0:4318



processors:

  batch:

    timeout: 10s



exporters:

  clickhouse:

    endpoint: tcp://signoz-clickhouse:9000

    database: signoz



  logging:

    verbosity: detailed



service:

  pipelines:


    traces:

      receivers:

        - otlp


      processors:

        - batch


      exporters:

        - clickhouse
        - logging



    metrics:

      receivers:

        - otlp


      processors:

        - batch


      exporters:

        - clickhouse
        - logging



    logs:

      receivers:

        - otlp


      processors:

        - batch


      exporters:

        - clickhouse
        - logging
